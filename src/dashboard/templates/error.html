<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Pickem Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="error-container">
        <div class="error-icon">⚠️</div>
        <h1>Oops! Something went wrong</h1>
        
        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% else %}
        <div class="error-message">
            An unexpected error occurred. Please try again later.
        </div>
        {% endif %}

        <a href="{{ url_for('admin.index') }}" class="back-button">Return to Dashboard</a>
    </div>

    <footer>
        <p>&copy; {{ current_year if current_year else 2024 }} Pickem Dashboard. All rights reserved.</p>
    </footer>
</body>
</html>
