<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header>
        <h1>Esports Pickem Dashboard</h1>
        <nav>
            <ul>
                <li><a href="{{ url_for('admin.index') }}">Admin</a></li>
                <li><a href="{{ url_for('admin.admin_stats') }}">Statistics</a></li>
                <li><a href="{{ url_for('admin.matches') }}">Matches</a></li>
                <li><a href="{{ url_for('api.get_leaderboard') }}">Leaderboard</a></li>
                <li><a href="{{ url_for('admin.leagues') }}">Leagues</a></li>
            </ul>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>&copy; {{ current_year }} Esports Pickem</p>
    </footer>
</body>
</html>
